openapi: "3.1.0"
info:
  title: Prefix Items
  version: "1.0.0"
paths: {}
components:
  schemas:
    Coordinate:
      type: array
      description: Two-integer (x, y) coordinate.
      prefixItems:
        - type: integer
          format: int32
        - type: integer
          format: int32
      minItems: 2
      maxItems: 2

    DateRange:
      type: array
      description: Inclusive start/end date range.
      prefixItems:
        - type: string
          format: date
        - type: string
          format: date
      minItems: 2
      maxItems: 2

    RGB:
      type: array
      description: 8-bit RGB triple.
      prefixItems:
        - type: integer
          format: int32
        - type: integer
          format: int32
        - type: integer
          format: int32
      minItems: 3
      maxItems: 3

    Marker:
      type: object
      description: A labelled position; exercises inline prefixItems on a struct property.
      required: [label, position]
      properties:
        label:
          type: string
        position:
          type: array
          prefixItems:
            - type: number
            - type: number
          minItems: 2
          maxItems: 2

    PointOrLabel:
      description: Exercises a tuple as a oneOf variant.
      oneOf:
        - type: array
          prefixItems:
            - type: number
            - type: number
          minItems: 2
          maxItems: 2
        - type: string