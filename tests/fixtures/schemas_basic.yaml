openapi: "3.1.0"
info:
  title: Basic Schemas
  version: "1.0.0"
paths: {}
components:
  schemas:
    User:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        email:
          type: string
        age:
          type: integer
          format: int32
        score:
          type: number
          format: float
        rating:
          type: number
        active:
          type: boolean