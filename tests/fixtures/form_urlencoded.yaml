openapi: "3.1.0"
info:
  title: Form Urlencoded Test
  version: "0.1.0"
paths:
  /login:
    post:
      operationId: login
      summary: Login with form credentials
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/LoginForm"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Token"
        "401":
          description: Invalid credentials

components:
  schemas:
    LoginForm:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
        password:
          type: string
    Token:
      type: object
      required:
        - access_token
      properties:
        access_token:
          type: string
