openapi: "3.1.0"
info:
  title: Default Response Test
  version: "0.1.0"
paths:
  /items:
    get:
      operationId: listItems
      summary: List items with a default error response (with body)
      responses:
        "200":
          description: A list of items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Item"
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteAllItems
      summary: Delete all items with a default response (no body)
      responses:
        "204":
          description: Items deleted
        default:
          description: unexpected error
components:
  schemas:
    Item:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
          format: int32
        message:
          type: string
