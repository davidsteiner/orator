openapi: "3.1.0"
info:
  title: Tennis Club API
  version: "0.1.0"
  description: A simple tennis club member management API.
  license:
    name: MIT
    url: https://github.com/davidsteiner/orator/blob/main/LICENSE


servers:
  - url: http://localhost:3000
    description: Local development server

tags:
  - name: members
    description: Member management
  - name: courts
    description: Court management
  - name: bookings
    description: Booking management

security:
  - bearerAuth: [ ]

paths:
  /members:
    get:
      operationId: listMembers
      summary: List all members
      tags: [ members ]
      security:
        - bearerAuth: [ ]
      parameters:
        - name: X-Request-ID
          in: header
          required: true
          schema:
            type: string
          description: Unique request identifier for tracing
        - name: X-Page-Size
          in: header
          required: false
          schema:
            type: integer
            format: int32
          description: Optional page size override via header
        - name: session_id
          in: cookie
          required: true
          schema:
            type: string
          description: Session identifier cookie
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            format: int32
          description: Maximum number of members to return
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            format: int32
          description: Number of members to skip
      responses:
        "200":
          description: A list of members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Member"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: createMember
      summary: Create a new member
      tags: [ members ]
      security:
        - bearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewMember"
      responses:
        "201":
          description: The created member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /members/{member_id}:
    get:
      operationId: getMember
      summary: Get a member by ID
      tags: [ members ]
      security:
        - bearerAuth: [ ]
      parameters:
        - name: member_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: The member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        "404":
          description: Member not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      operationId: updateMember
      summary: Update a member
      tags: [ members ]
      security:
        - bearerAuth: [ ]
      parameters:
        - name: member_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMember"
      responses:
        "200":
          description: The updated member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        "404":
          description: Member not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteMember
      summary: Delete a member
      tags: [ members ]
      security:
        - bearerAuth: [ ]
      parameters:
        - name: member_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: Member deleted
        "404":
          description: Member not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /members/{member_id}/photo:
    get:
      operationId: getMemberPhoto
      summary: Download a member's profile photo
      tags: [ members ]
      parameters:
        - name: member_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: The profile photo
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          description: Member or photo not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      operationId: uploadMemberPhoto
      summary: Upload a member's profile photo
      tags: [ members ]
      parameters:
        - name: member_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        "204":
          description: Photo uploaded
        "404":
          description: Member not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /bookings:
    get:
      operationId: listBookings
      summary: List all bookings
      tags: [ bookings ]
      security:
        - bearerAuth: [ ]
      responses:
        "200":
          description: A list of bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /courts/{court_id}/photo:
    put:
      operationId: uploadCourtPhoto
      summary: Upload a court photo with metadata
      tags: [ courts ]
      parameters:
        - name: court_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                photo:
                  type: string
                  format: binary
                caption:
                  type: string
      responses:
        "204":
          description: Photo uploaded
        "404":
          description: Court not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /courts:
    get:
      operationId: listCourts
      summary: List all courts
      tags: [ courts ]
      security:
        - bearerAuth: [ ]
      responses:
        "200":
          description: A list of courts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Court"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  schemas:
    Member:
      type: object
      required:
        - id
        - first_name
        - last_name
      properties:
        id:
          type: integer
          format: int64
        first_name:
          type: string
        last_name:
          type: string

    NewMember:
      type: object
      required:
        - first_name
        - last_name
      properties:
        first_name:
          type: string
        last_name:
          type: string

    UpdateMember:
      type: object
      properties:
        first_name:
          type: string
        last_name:
          type: string

    Surface:
      type: string
      enum: [ clay, grass, hard ]

    Court:
      type: object
      required: [ id, name, surface ]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        surface:
          $ref: "#/components/schemas/Surface"
        indoor:
          type: boolean

    MemberBooking:
      type: object
      required: [ booking_type, court_id, member_id, date ]
      properties:
        booking_type:
          type: string
        court_id:
          type: integer
          format: int64
        member_id:
          type: integer
          format: int64
        date:
          type: string

    GuestBooking:
      type: object
      required: [ booking_type, court_id, guest_name, date ]
      properties:
        booking_type:
          type: string
        court_id:
          type: integer
          format: int64
        guest_name:
          type: string
        date:
          type: string

    Booking:
      oneOf:
        - $ref: "#/components/schemas/MemberBooking"
        - $ref: "#/components/schemas/GuestBooking"
      discriminator:
        propertyName: booking_type
        mapping:
          member: "#/components/schemas/MemberBooking"
          guest: "#/components/schemas/GuestBooking"

    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
          format: int32
        message:
          type: string
