openapi: "3.1.0"
info:
  title: Tennis Club API
  version: "0.1.0"
  description: A simple tennis club member management API.

paths:
  /members:
    get:
      operationId: listMembers
      summary: List all members
      responses:
        "200":
          description: A list of members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Member"
    post:
      operationId: createMember
      summary: Create a new member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewMember"
      responses:
        "201":
          description: The created member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"

  /members/{member_id}:
    get:
      operationId: getMember
      summary: Get a member by ID
      parameters:
        - name: member_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: The member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        "404":
          description: Member not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      operationId: updateMember
      summary: Update a member
      parameters:
        - name: member_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMember"
      responses:
        "200":
          description: The updated member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        "404":
          description: Member not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteMember
      summary: Delete a member
      parameters:
        - name: member_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: Member deleted
        "404":
          description: Member not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  schemas:
    Member:
      type: object
      required:
        - id
        - first_name
        - last_name
      properties:
        id:
          type: integer
          format: int64
        first_name:
          type: string
        last_name:
          type: string

    NewMember:
      type: object
      required:
        - first_name
        - last_name
      properties:
        first_name:
          type: string
        last_name:
          type: string

    UpdateMember:
      type: object
      properties:
        first_name:
          type: string
        last_name:
          type: string

    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
          format: int32
        message:
          type: string
