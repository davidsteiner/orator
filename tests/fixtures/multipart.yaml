openapi: "3.1.0"
info:
  title: Multipart Test
  version: "0.1.0"
paths:
  /upload:
    post:
      operationId: uploadDocument
      summary: Upload a document with metadata
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                description:
                  type: string
      responses:
        "201":
          description: Document uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
        "400":
          description: Bad request

components:
  schemas:
    Document:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
