openapi: "3.1.0"
info:
  title: Recursive schemas test
  version: "1.0.0"
paths: {}
components:
  schemas:
    # Direct self-reference (required field) → should Box
    ListNode:
      type: object
      required: [value, next]
      properties:
        value:
          type: string
        next:
          $ref: "#/components/schemas/ListNode"

    # Self-reference via array → should NOT Box (Vec provides indirection)
    TreeNode:
      type: object
      required: [name, children]
      properties:
        name:
          type: string
        children:
          type: array
          items:
            $ref: "#/components/schemas/TreeNode"

    # Self-reference on optional field → should NOT Box (Option provides indirection)
    OptionalSelfRef:
      type: object
      required: [id]
      properties:
        id:
          type: integer
          format: int64
        parent:
          $ref: "#/components/schemas/OptionalSelfRef"

    # Indirect cycle: A → B → A (both required) → both should Box
    CycleA:
      type: object
      required: [b]
      properties:
        b:
          $ref: "#/components/schemas/CycleB"

    CycleB:
      type: object
      required: [a]
      properties:
        a:
          $ref: "#/components/schemas/CycleA"
